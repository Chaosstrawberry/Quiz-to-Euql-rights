<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gleichberechtigungs-Quiz</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f1f5f9;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #4b5563;
      --primary: #2563eb;
      --success: #16a34a;
      --danger: #dc2626;
      --border: rgba(148, 163, 184, 0.3);
      --shadow: 0 30px 60px rgba(15, 23, 42, 0.08);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; font-family: 'Inter', system-ui, sans-serif;
      background: radial-gradient(circle at top left, rgba(37,99,235,0.15), transparent 30%),
                  radial-gradient(circle at bottom right, rgba(34,197,94,0.12), transparent 25%),
                  var(--bg);
      color: var(--text);
    }

    .page {
      max-width: 920px; margin: 0 auto; padding: 24px;
    }

    .quiz-card {
      background: var(--card); border: 1px solid var(--border); border-radius: 24px;
      box-shadow: var(--shadow); overflow: hidden;
    }

    .quiz-header {
      padding: 32px 28px 22px;
      display: grid; gap: 14px;
    }

    .quiz-header h1 {
      margin: 0; font-size: clamp(2rem, 2.5vw, 2.5rem);
      letter-spacing: -0.03em;
    }

    .quiz-header p {
      margin: 0; color: var(--muted); line-height: 1.7;
    }

    .stats {
      display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    }

    .stat-pill {
      padding: 10px 14px; border-radius: 999px; background: #eef2ff; color: #1d4ed8;
      font-size: 0.95rem; font-weight: 600;
    }

    .progress-bar {
      width: 100%; height: 10px; border-radius: 999px; background: #e5e7eb;
      overflow: hidden; margin-top: 6px;
    }

    .progress-fill {
      width: 0%; height: 100%; border-radius: 999px; background: linear-gradient(90deg, #2563eb, #14b8a6);
      transition: width 0.3s ease;
    }

    .quiz-body {
      padding: 28px; border-top: 1px solid var(--border);
    }

    .question-text {
      margin: 0 0 22px; font-size: 1.15rem; font-weight: 700;
    }

    .topic-badge {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: 999px; background: #ede9fe; color: #5b21b6;
      font-size: 0.9rem; margin-bottom: 10px;
    }

    .answers {
      display: grid; gap: 12px;
    }

    .answers button {
      width: 100%; padding: 16px 18px; border: 1px solid var(--border);
      background: #fbfbfd; color: var(--text); text-align: left; font-size: 1rem;
      border-radius: 16px; cursor: pointer; transition: transform 0.2s ease, border-color 0.2s ease;
    }

    .answers button:hover:not(:disabled) {
      transform: translateY(-1px); border-color: #93c5fd;
    }

    .answers button.correct { background: #dcfce7; border-color: #4ade80; }
    .answers button.wrong { background: #fee2e2; border-color: #fca5a5; }

    .controls {
      display: flex; flex-wrap: wrap; gap: 12px; margin-top: 24px;
      justify-content: space-between; align-items: center;
    }

    .button-primary, .button-secondary {
      border: none; border-radius: 14px; padding: 14px 22px; font-weight: 700;
      cursor: pointer; transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button-primary { background: linear-gradient(135deg, #2563eb, #14b8a6); color: white; }
    .button-secondary { background: #f8fafc; color: #334155; }

    .button-primary:hover, .button-secondary:hover { transform: translateY(-1px); }

    .result-card {
      padding: 32px 28px; text-align: center;
      background: #f8fafc; border-radius: 20px; border: 1px solid var(--border);
    }

    .result-card h2 { margin: 0 0 18px; font-size: 1.9rem; }
    .result-card p { margin: 0; color: var(--muted); }

    @media (max-width: 640px) {
      .page { padding: 16px; }
      body { background-position: top left, bottom right; }
      .quiz-card { border-radius: 20px; }
      .quiz-header, .quiz-body { padding: 18px; }
      .quiz-header h1 { font-size: 1.8rem; }
      .stats { flex-direction: column; align-items: flex-start; }
      .stat-pill { width: 100%; text-align: center; }
      .progress-bar { height: 12px; }
      .question-text { font-size: 1.05rem; margin-bottom: 18px; }
      .answers button { padding: 16px; font-size: 1rem; }
      .controls { flex-direction: column; align-items: stretch; }
      .button-primary, .button-secondary { width: 100%; padding: 16px; }
      .result-card { padding: 24px 18px; }
      .result-card h2 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <main class="page">
    <section class="quiz-card">
      <header class="quiz-header">
        <div>
          <h1>Gleichberechtigungs-Quiz</h1>
          <p>Teste dein Wissen zu Gleichberechtigung, Rollenbildern und Fairness. Die Fragen sind gemischt, die Antworten zufällig angeordnet.</p>
        </div>

        <div class="stats">
          <div class="stat-pill" id="progressText">Frage 1 / 12</div>
          <div class="stat-pill" id="scoreText">Punkte: 0</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      </header>

      <div class="quiz-body">
        <div id="questionBox"></div>
        <div id="answersBox" class="answers"></div>

        <div class="controls">
          <button id="nextBtn" class="button-primary" style="display:none;">Nächste Frage</button>
          <button id="restartBtn" class="button-secondary" style="display:none;">Nochmal spielen</button>
        </div>
      </div>
    </section>
  </main>

  <script>
    const questions = [
      {
        text: "Was beschreibt den Gender Pay Gap?",
        answers: [
          { text: "Lohnunterschied zwischen Männern und Frauen", correct: true },
          { text: "Unterschiedliche Arbeitszeiten", correct: false },
          { text: "Nur freiwillige Gehaltsunterschiede", correct: false },
          { text: "Nur Unterschiede bei Praktika", correct: false }
        ],
        topic: "Gender Pay Gap"
      },
      {
        text: "Warum sind stereotype Rollenbilder problematisch?",
        answers: [
          { text: "Sie schränken Menschen in Berufswahl und Verhalten ein", correct: true },
          { text: "Sie helfen beim schnellen Arbeiten", correct: false },
          { text: "Sie gelten nur für Erwachsene", correct: false },
          { text: "Sie haben keine Wirkung auf Gefühle", correct: false }
        ],
        topic: "Stereotype"
      },
      {
        text: "Was bedeutet Intersectionality?",
        answers: [
          { text: "Verschiedene Diskriminierungsformen können sich überschneiden", correct: true },
          { text: "Eine neue Sportart", correct: false },
          { text: "Nur wirtschaftliche Ungleichheit", correct: false },
          { text: "Das Gegenteil von Gleichberechtigung", correct: false }
        ],
        topic: "Intersectionality"
      },
      {
        text: "Welche Aussage gehört zu gleichen Chancen?",
        answers: [
          { text: "Jede Person hat das Recht auf faire Teilnahme", correct: true },
          { text: "Erfolg hängt nur von Glück ab", correct: false },
          { text: "Nur diejenigen mit Macht können lernen", correct: false },
          { text: "Chancen müssen nicht erklärt werden", correct: false }
        ],
        topic: "Chancengleichheit"
      },
      {
        text: "Wieso ist Repräsentation wichtig?",
        answers: [
          { text: "Weil Menschen Vorbilder in Medien und Politik brauchen", correct: true },
          { text: "Weil nur berühmte Menschen zählen", correct: false },
          { text: "Weil es weniger Platz in der Schule schafft", correct: false },
          { text: "Weil es immer teurer ist", correct: false }
        ],
        topic: "Repräsentation"
      },
      {
        text: "Was ist ein Beispiel für sexuelle Belästigung?",
        answers: [
          { text: "Ungewollte Kommentare zum Körper", correct: true },
          { text: "Ein Kompliment über das Outfit", correct: false },
          { text: "Ein freundliches ‚Guten Morgen‘", correct: false },
          { text: "Ein kleines Geschenk ohne Zustimmung", correct: false }
        ],
        topic: "Respekt"
      },
      {
        text: "Wer profitiert von Gleichberechtigung?",
        answers: [
          { text: "Alle, weil fairere Regeln für jede Person entstehen", correct: true },
          { text: "Nur Studierende", correct: false },
          { text: "Nur Manager", correct: false },
          { text: "Nur Menschen mit hohem Einkommen", correct: false }
        ],
        topic: "Gleichberechtigung"
      },
      {
        text: "Warum ist faire Elternzeit wichtig?",
        answers: [
          { text: "Weil beide Eltern besser private und berufliche Aufgaben teilen können", correct: true },
          { text: "Weil nur Mütter zuhause bleiben sollten", correct: false },
          { text: "Weil Arbeit weniger wichtig ist", correct: false },
          { text: "Weil Väter nicht unterstützen wollen", correct: false }
        ],
        topic: "Familie"
      },
      {
        text: "Welche Aussage beschreibt Alltagsdiskriminierung?",
        answers: [
          { text: "Kleine Handlungen, die Menschen wegen ihres Aussehens benachteiligen", correct: true },
          { text: "Nur schwere Straftaten", correct: false },
          { text: "Ein Lob für gute Arbeit", correct: false },
          { text: "Nur Probleme in anderen Ländern", correct: false }
        ],
        topic: "Diskriminierung"
      },
      {
        text: "Was bedeutet Gender-Dysphorie?",
        answers: [
          { text: "Körper und empfundenes Geschlecht stimmen nicht überein", correct: true },
          { text: "Eine Modevorliebe", correct: false },
          { text: "Nur bis zur Pubertät", correct: false },
          { text: "Eine Krankheit ohne Grund", correct: false }
        ],
        topic: "Gender"
      },
      {
        text: "Welche Wirkung hat ein realistisches Körperbild?",
        answers: [
          { text: "Es reduziert Stress und fördert Selbstakzeptanz", correct: true },
          { text: "Es macht Leute erfolgreicher im Sport", correct: false },
          { text: "Es ist nur für Models wichtig", correct: false },
          { text: "Es erzeugt mehr Konkurrenz", correct: false }
        ],
        topic: "Körperbild"
      },
      {
        text: "Warum ist Teamarbeit in vielfältigen Gruppen stark?",
        answers: [
          { text: "Weil unterschiedliche Perspektiven bessere Lösungen bringen", correct: true },
          { text: "Weil alle dieselbe Meinung haben müssen", correct: false },
          { text: "Weil nur Experten zählen", correct: false },
          { text: "Weil weniger Personen schneller sind", correct: false }
        ],
        topic: "Teamwork"
      },
      {
        text: "Was bedeutet Inklusion am besten?",
        answers: [
          { text: "Menschen mit unterschiedlichen Voraussetzungen aktiv einzubeziehen", correct: true },
          { text: "Nur gleiche Regeln für alle zu haben", correct: false },
          { text: "Menschen zu trennen, damit sie sich wohler fühlen", correct: false },
          { text: "Nur körperliche Behinderungen zu berücksichtigen", correct: false }
        ],
        topic: "Inklusion"
      },
      {
        text: "Worauf solltest du bei einer respektvollen Diskussion achten?",
        answers: [
          { text: "Andere Meinungen ernst nehmen und zuhören", correct: true },
          { text: "Schnell gewinnen wollen", correct: false },
          { text: "Laut zu sprechen, um Aufmerksamkeit zu bekommen", correct: false },
          { text: "Gleich immer zu unterbrechen", correct: false }
        ],
        topic: "Respekt"
      },
      {
        text: "Was bedeutet Allies sein?",
        answers: [
          { text: "Menschen unterstützen, die weniger gehört werden", correct: true },
          { text: "Nur eigene Interessen verfolgen", correct: false },
          { text: "Andere ständig verbessern", correct: false },
          { text: "Alle Probleme für andere lösen", correct: false }
        ],
        topic: "Allianz"
      },
      {
        text: "Welche Aussage passt zur Barrierefreiheit?",
        answers: [
          { text: "Zugang für alle Menschen schaffen, unabhängig von Fähigkeiten", correct: true },
          { text: "Nur Rampen für Rollstühle bauen", correct: false },
          { text: "Nur digitale Inhalte veröffentlichen", correct: false },
          { text: "Nur für besondere Tage erreichbar sein", correct: false }
        ],
        topic: "Barrierefreiheit"
      },
      {
        text: "Warum hilft es, Begriffe wie ‚Mansplaining‘ zu kennen?",
        answers: [
          { text: "Um respektvolles Verhalten und Ungleichheiten besser zu erkennen", correct: true },
          { text: "Damit man andere besser korrigieren kann", correct: false },
          { text: "Weil solche Begriffe immer nett sind", correct: false },
          { text: "Weil es nur ein Modewort ist", correct: false }
        ],
        topic: "Sprache"
      }
    ];

    let currentIndex = 0;
    let score = 0;
    const questionBox = document.getElementById('questionBox');
    const answersBox = document.getElementById('answersBox');
    const nextBtn = document.getElementById('nextBtn');
    const restartBtn = document.getElementById('restartBtn');
    const progressText = document.getElementById('progressText');
    const scoreText = document.getElementById('scoreText');
    const progressFill = document.getElementById('progressFill');
    const totalQuestions = questions.length;

    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
    }

    function resetQuiz() {
      currentIndex = 0;
      score = 0;
      scoreText.textContent = `Punkte: ${score}`;
      progressText.textContent = `Frage 1 / ${totalQuestions}`;
      progressFill.style.width = `0%`;
      restartBtn.style.display = 'none';
      nextBtn.style.display = 'none';
      shuffle(questions);
      questions.forEach(q => shuffle(q.answers));
    }

    function showQuestion() {
      const question = questions[currentIndex];
      questionBox.innerHTML = `
        <div class="topic-badge">${question.topic}</div>
        <p class="question-text">${question.text}</p>
      `;
      answersBox.innerHTML = '';
      question.answers.forEach(answer => {
        const button = document.createElement('button');
        button.textContent = answer.text;
        button.addEventListener('click', () => selectAnswer(button, answer.correct));
        answersBox.appendChild(button);
      });
      nextBtn.style.display = 'none';
      progressText.textContent = `Frage ${currentIndex + 1} / ${totalQuestions}`;
      progressFill.style.width = `${((currentIndex) / totalQuestions) * 100}%`;
    }

    function selectAnswer(button, isCorrect) {
      const buttons = Array.from(answersBox.querySelectorAll('button'));
      buttons.forEach(btn => btn.disabled = true);

      if (isCorrect) {
        button.classList.add('correct');
        score++;
      } else {
        button.classList.add('wrong');
        const correctButton = buttons.find((btn, index) => {
          return questions[currentIndex].answers[index].text === btn.textContent &&
                 questions[currentIndex].answers[index].correct;
        });
        if (correctButton) correctButton.classList.add('correct');
      }

      scoreText.textContent = `Punkte: ${score}`;
      nextBtn.style.display = 'inline-flex';
    }

    function showResults() {
      questionBox.innerHTML = `
        <div class="result-card">
          <h2>Gut gemacht!</h2>
          <p>Du hast ${score} von ${totalQuestions} Fragen richtig beantwortet.</p>
          <p>Mehr Wissen schafft mehr Respekt – probiere den Quiz nochmal, um deine Punktzahl zu verbessern.</p>
        </div>
      `;
      answersBox.innerHTML = '';
      nextBtn.style.display = 'none';
      restartBtn.style.display = 'inline-flex';
      progressText.textContent = `Fertig`;
      progressFill.style.width = `100%`;
    }

    nextBtn.addEventListener('click', () => {
      currentIndex++;
      if (currentIndex < totalQuestions) {
        showQuestion();
      } else {
        showResults();
      }
    });

    restartBtn.addEventListener('click', () => {
      resetQuiz();
      showQuestion();
    });

    resetQuiz();
    showQuestion();
  </script>
</body>
</html>
